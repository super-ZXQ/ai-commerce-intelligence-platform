<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>电商数据分析API - 可视化体验</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; overflow-x: hidden; }

/* 粒子背景 */
#particle-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 0;
}
.header, .container, .footer { position: relative; z-index: 1; }

/* 动画就绪态 */
.card, .header, .metric-item, .rank-item, .platform-bar, .ai-chat {
    will-change: transform, opacity;
}

.header { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); padding: 24px 32px; border-bottom: 1px solid #475569; display: flex; align-items: center; gap: 16px; }
.header h1 { font-size: 22px; font-weight: 600; }
.header .badge { background: #818cf8; color: white; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: 500; }
.header .url { margin-left: auto; color: #94a3b8; font-size: 14px; font-family: monospace; }

.container { max-width: 1400px; margin: 0 auto; padding: 24px; display: grid; grid-template-columns: repeat(auto-fit, minmax(340px, 1fr)); gap: 20px; }

.card { background: #1e293b; border-radius: 12px; border: 1px solid #334155; overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
.card:hover { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(129, 140, 248, 0.15); }
.card-header { padding: 16px 20px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; }
.card-header h3 { font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
.card-header .status { width: 10px; height: 10px; border-radius: 50%; background: #64748b; }
.card-header .status.ok { background: #22c55e; box-shadow: 0 0 10px rgba(34,197,94,0.5); }
.card-header .status.err { background: #ef4444; }
.card-body { padding: 20px; min-height: 200px; position: relative; }

/* 指标卡片 */
.metric-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.metric-item { background: #0f172a; border-radius: 8px; padding: 14px; text-align: center; }
.metric-value { font-size: 24px; font-weight: 700; color: #818cf8; }
.metric-label { font-size: 12px; color: #94a3b8; margin-top: 4px; }

/* 排名列表 */
.rank-list { list-style: none; }
.rank-item { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #1e293b; }
.rank-item:last-child { border-bottom: none; }
.rank-num { width: 26px; height: 26px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; margin-right: 12px; }
.rank-num.top1 { background: linear-gradient(135deg, #f59e0b, #d97706); color: white; }
.rank-num.top2 { background: linear-gradient(135deg, #94a3b8, #64748b); color: white; }
.rank-num.top3 { background: linear-gradient(135deg, #cd7c3a, #a1623a); color: white; }
.rank-num.normal { background: #334155; color: #94a3b8; }
.rank-name { flex: 1; font-size: 14px; font-weight: 500; }
.rank-val { font-size: 14px; color: #818cf8; font-weight: 600; }

/* 平台占比 */
.platform-bar { margin-bottom: 14px; }
.platform-info { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 13px; }
.platform-info .name { font-weight: 500; }
.platform-info .pct { color: #818cf8; font-weight: 600; }
.bar-track { height: 8px; background: #0f172a; border-radius: 4px; overflow: hidden; }
.bar-fill { height: 100%; border-radius: 4px; transition: width 1s ease; }

/* AI 对话 */
.ai-chat { display: flex; flex-direction: column; height: 100%; }
.ai-input-area { display: flex; gap: 8px; margin-bottom: 14px; }
.ai-input-area input { flex: 1; background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 10px 14px; color: #e2e8f0; font-size: 14px; outline: none; }
.ai-input-area input:focus { border-color: #818cf8; }
.ai-btn { background: #818cf8; color: white; border: none; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 14px; font-weight: 500; transition: background 0.2s; }
.ai-btn:hover { background: #6366f1; }
.ai-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.ai-response { background: #0f172a; border-radius: 8px; padding: 14px; flex: 1; overflow-y: auto; font-size: 14px; line-height: 1.7; white-space: pre-wrap; }
.ai-loading { color: #818cf8; font-style: italic; }

/* 订单表格 */
.order-table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
.order-table th { text-align: left; padding: 10px 12px; color: #94a3b8; font-weight: 500; border-bottom: 2px solid #334155; font-size: 13px; white-space: nowrap; }
.order-table td { padding: 10px 12px; border-bottom: 1px solid #1e293b; word-break: break-all; vertical-align: middle; }
.order-table tr:hover td { background: rgba(129,140,248,0.05); }
.order-table th:nth-child(1) { width: 22%; }
.order-table th:nth-child(2) { width: 16%; }
.order-table th:nth-child(3) { width: 14%; text-align: right; }
.order-table td:nth-child(3) { text-align: right; font-weight: 600; color:#a5b4fc; }
.order-table th:nth-child(4) { width: 12%; text-align: center; }
.order-table td:nth-child(4) { text-align: center; }
.order-table th:nth-child(5) { width: 36%; }
.tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
.tag-app { background: rgba(99,102,241,0.2); color: #818cf8; }
.tag-wx { background: rgba(34,197,94,0.2); color: #22c55e; }
.tag-web { background: rgba(245,158,11,0.2); color: #f59e0b; }

.loading-spinner { text-align: center; padding: 40px; color: #64748b; }
.error-text { color: #ef4444; font-size: 13px; padding: 20px; text-align: center; }

.section-title { font-size: 17px; font-weight: 700; margin-bottom: 20px; color: #f1f5f9; display: flex; align-items: center; gap: 10px; }
.section-title .icon { font-size: 22px; }

.full-width { grid-column: 1 / -1; }

@media (max-width: 768px) {
    .container { grid-template-columns: 1fr; padding: 12px; }
}
</style>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
</head>
<body>
<canvas id="particle-canvas"></canvas>

<div class="header">
    <h1>🛒 电商数据分析系统 - FastAPI 后端</h1>
    <span class="badge">API v1.6</span>
    <span class="url" id="apiUrl"></span>
    <a href="/" style="margin-left:16px;color:#94a3b8;text-decoration:none;font-size:14px;">← 返回首页</a>
</div>

<div class="container">

    <!-- 销售总览 -->
    <div class="card full-width">
        <div class="card-header"><h3><span class="status ok" id="s1_status"></span> 📊 销售总览</h3></div>
        <div class="card-body"><div id="overview_content"><div class="loading-spinner">加载中...</div></div></div>
    </div>

    <!-- 热销商品 -->
    <div class="card">
        <div class="card-header"><h3><span class="status ok" id="s2_status"></span> 🏆 热销商品 TOP5</h3></div>
        <div class="card-body"><div id="products_content"><div class="loading-spinner">加载中...</div></div></div>
    </div>

    <!-- 用户行为 -->
    <div class="card">
        <div class="card-header"><h3><span class="status ok" id="s3_status"></span> 👥 用户行为分析</h3></div>
        <div class="card-body"><div id="behavior_content"><div class="loading-spinner">加载中...</div></div></div>
    </div>

    <!-- 平台占比 -->
    <div class="card">
        <div class="card-header"><h3><span class="status ok" id="s4_status"></span> 📱 平台销售占比</h3></div>
        <div class="card-body"><div id="category_content"><div class="loading-spinner">加载中...</div></div></div>
    </div>

    <!-- 最新订单 -->
    <div class="card full-width">
        <div class="card-header"><h3><span class="status ok" id="s5_status"></span> 📦 最新订单</h3></div>
        <div class="card-body"><div id="orders_content"><div class="loading-spinner">加载中...</div></div></div>
    </div>

    <!-- AI 助手 -->
    <div class="card full-width">
        <div class="card-header"><h3><span class="status ok" id="s6_status"></span> 🤖 AI 智能查询助手（Text-to-SQL）</h3></div>
        <div class="card-body">
            <div class="ai-chat">
                <div class="ai-input-area">
                    <input type="text" id="ai_input" placeholder="输入自然语言问题，例如：查询最近7天的销售额、哪个平台订单最多..." value="销售额最高的3个商品编号和金额是多少？">
                    <button class="ai-btn" id="ai_btn" onclick="askAI()">发送查询</button>
                </div>
                <div class="ai-response" id="ai_response">点击「发送查询」开始AI对话...</div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/gsap@3/dist/ScrollTrigger.min.js"></script>
<script>
// ====== 粒子背景 ======
(function initParticles() {
    const canvas = document.getElementById('particle-canvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let particles = [];
    const COUNT = 40;
    let mouse = { x: -999, y: -999 };

    function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    resize();
    window.addEventListener('resize', resize);
    document.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });

    class P {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.vx = (Math.random() - 0.5) * 0.25;
            this.vy = (Math.random() - 0.5) * 0.25;
            this.size = Math.random() * 1.8 + 0.5;
            this.alpha = Math.random() * 0.35 + 0.1;
        }
        update() {
            this.x += this.vx; this.y += this.vy;
            if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
            const dx = mouse.x - this.x, dy = mouse.y - this.y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 120) { this.x -= dx * 0.004; this.y -= dy * 0.004; }
        }
        draw() {
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fillStyle = `rgba(129,140,248,${this.alpha})`; ctx.fill();
        }
    }

    for (let i = 0; i < COUNT; i++) particles.push(new P());

    function connect() {
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                if (dist < 100) {
                    ctx.beginPath();
                    ctx.strokeStyle = `rgba(129,140,248,${0.05 * (1 - dist / 100)})`;
                    ctx.lineWidth = 0.4;
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.stroke();
                }
            }
        }
    }

    (function loop() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        connect();
        requestAnimationFrame(loop);
    })();
})();

// ====== GSAP 动画 ======
gsap.registerPlugin(ScrollTrigger);

// 页面加载动画
const tl = gsap.timeline({ defaults: { ease: 'power3.out' } });

// Header 入场
tl.from('.header', { y: -60, opacity: 0, duration: 0.7 });

// 卡片交错入场
tl.from('.card', {
    y: 40, opacity: 0, scale: 0.96,
    duration: 0.6, stagger: 0.1, ease: 'back.out(1.1)'
}, '-=0.3');

// 页脚
tl.from('.footer', { opacity: 0, y: 20, duration: 0.4 }, '-=0.2');

// ====== 数据加载后动画 ======
// 指标数字计数器
function animateCounters() {
    document.querySelectorAll('.metric-value').forEach(el => {
        const text = el.textContent.trim();
        const num = text.replace(/[¥,%]/g, '');
        const prefix = text.startsWith('¥') ? '¥' : '';
        const suffix = text.includes('%') ? '%' : '';
        const val = parseFloat(num);
        if (isNaN(val)) return;
        const obj = { val: 0 };
        gsap.to(obj, {
            val: val, duration: 1.5, ease: 'power2.out',
            onUpdate: () => {
                if (suffix === '%') {
                    el.textContent = prefix + obj.val.toFixed(1) + suffix;
                } else if (val >= 1000) {
                    el.textContent = prefix + Math.round(obj.val).toLocaleString('zh-CN') + suffix;
                } else {
                    el.textContent = prefix + obj.val.toFixed(2) + suffix;
                }
            }
        });
    });
}

// 排行项交错入场
function animateRankItems() {
    gsap.from('.rank-item', {
        x: -30, opacity: 0, stagger: 0.08, duration: 0.5, ease: 'power2.out'
    });
}

// 平台进度条动画
function animatePlatformBars() {
    document.querySelectorAll('.bar-fill').forEach(bar => {
        const target = bar.style.width;
        bar.style.width = '0%';
        gsap.to(bar, { width: target, duration: 1.2, ease: 'power2.out', delay: 0.3 });
    });
}

// 订单表格行交错
function animateOrderRows() {
    gsap.from('.order-table tbody tr', {
        y: 15, opacity: 0, stagger: 0.06, duration: 0.4, ease: 'power2.out'
    });
}

// AI 对话区入场
function animateAIChat() {
    gsap.from('.ai-chat', {
        y: 20, opacity: 0, duration: 0.6, ease: 'power2.out'
    });
}

// 监听数据加载完成 (MutationObserver)
const overviewEl = document.getElementById('overview_content');
if (overviewEl) {
    const observer = new MutationObserver(() => {
        if (!overviewEl.querySelector('.loading-spinner')) {
            setTimeout(() => {
                animateCounters();
                animateRankItems();
                animatePlatformBars();
                animateOrderRows();
                animateAIChat();
            }, 100);
            observer.disconnect();
        }
    });
    observer.observe(overviewEl, { childList: true });
}

// ====== 卡片 3D 倾斜 ======
document.querySelectorAll('.card').forEach(card => {
    card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left;
        const y = e.clientY - rect.top;
        const cx = rect.width / 2, cy = rect.height / 2;
        const rx = (y - cy) / cy * -3;
        const ry = (x - cx) / cx * 3;
        gsap.to(card, {
            rotateX: rx, rotateY: ry, transformPerspective: 800,
            duration: 0.25, ease: 'power2.out',
            boxShadow: `${-ry * 2}px ${rx * 2}px 25px rgba(0,0,0,0.35), 0 0 30px rgba(129,140,248,0.1)`
        });
    });
    card.addEventListener('mouseleave', () => {
        gsap.to(card, {
            rotateX: 0, rotateY: 0,
            boxShadow: '0 8px 30px rgba(129,140,248,0.15)',
            duration: 0.4, ease: 'power2.out'
        });
    });
});

// ====== 状态指示灯脉冲 ======
document.querySelectorAll('.status.ok').forEach(dot => {
    gsap.to(dot, {
        boxShadow: '0 0 16px rgba(34,197,94,0.7)',
        repeat: -1, yoyo: true, duration: 1.5, ease: 'sine.inOut'
    });
});

const BASE = window.location.origin;
let authToken = null;

async function ensureAuth() {
    if (authToken) return authToken;
    try {
        const r = await fetch(BASE + '/api/auth/login', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: 'admin', password: 'admin123'})
        });
        if (r.ok) {
            const d = await r.json();
            authToken = d.access_token;
            return authToken;
        }
        return null;
    } catch(e) { return null; }
}

// 带 token 的 fetch 封装
async function authFetch(url, options = {}) {
    const token = await ensureAuth();
    if (!token) throw new Error('认证失败');
    const headers = { ...options.headers, 'Authorization': `Bearer ${token}` };
    return fetch(url, { ...options, headers });
}

document.getElementById('apiUrl').textContent = BASE + '/docs';

function setStatus(id, ok) {
    const el = document.getElementById(id);
    el.className = 'status ' + (ok ? 'ok' : 'err');
}

function formatMoney(n) {
    return '¥' + Number(n).toLocaleString('zh-CN', {minimumFractionDigits: 2});
}

function formatNum(n) {
    return Number(n).toLocaleString('zh-CN');
}

// ====== 1. 销售总览 ======
async function loadOverview() {
    try {
        const r = await authFetch(BASE + '/api/analytics/sales-overview');
        const d = await r.json();
        setStatus('s1_status', true);
        document.getElementById('overview_content').innerHTML = `
            <div class="metric-grid">
                <div class="metric-item"><div class="metric-value">${formatMoney(d.total_sales)}</div><div class="metric-label">总销售额</div></div>
                <div class="metric-item"><div class="metric-value">${formatNum(d.total_orders)}</div><div class="metric-label">总订单数</div></div>
                <div class="metric-item"><div class="metric-value">${formatMoney(d.avg_order_value)}</div><div class="metric-label">平均客单价</div></div>
                <div class="metric-item"><div class="metric-value">${formatNum(d.total_users)}</div><div class="metric-label">总用户数</div></div>
                <div class="metric-item"><div class="metric-value">${d.refund_rate}%</div><div class="metric-label">退款率</div></div>
                <div class="metric-item"><div class="metric-value">${formatMoney(d.total_refund_amount)}</div><div class="metric-label">退款总额</div></div>
            </div>`;
    } catch(e) {
        setStatus('s1_status', false);
        document.getElementById('overview_content').innerHTML = '<div class="error-text">加载失败: ' + e.message + '</div>';
    }
}

// ====== 2. 热销商品 ======
async function loadProducts() {
    try {
        const r = await authFetch(BASE + '/api/analytics/top-products?limit=5');
        const d = await r.json();
        setStatus('s2_status', true);
        let html = '<ul class="rank-list">';
        d.forEach((p, i) => {
            const cls = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : 'normal';
            html += `<li class="rank-item"><span class="rank-num ${cls}">${i + 1}</span><span class="rank-name">${p.product_id}</span><span class="rank-val">${formatMoney(p.total_sales)} (${p.order_count}笔)</span></li>`;
        });
        html += '</ul>';
        document.getElementById('products_content').innerHTML = html;
    } catch(e) {
        setStatus('s2_status', false);
        document.getElementById('products_content').innerHTML = '<div class="error-text">加载失败</div>';
    }
}

// ====== 3. 用户行为 ======
async function loadBehavior() {
    try {
        const r = await authFetch(BASE + '/api/analytics/user-behavior');
        const d = await r.json();
        setStatus('s3_status', true);
        document.getElementById('behavior_content').innerHTML = `
            <div class="metric-grid">
                <div class="metric-item"><div class="metric-value">${d.repeat_purchase_rate}%</div><div class="metric-label">复购率</div></div>
                <div class="metric-item"><div class="metric-value">${d.avg_order_frequency}</div><div class="metric-label">人均消费频次</div></div>
                <div class="metric-item"><div class="metric-value">${formatNum(d.active_users_7d)}</div><div class="metric-label">7日活跃用户</div></div>
                <div class="metric-item"><div class="metric-value">${formatNum(d.active_users_30d)}</div><div class="metric-label">30日活跃用户</div></div>
                <div class="metric-item"><div class="metric-value">${formatMoney(d.avg_customer_value)}</div><div class="metric-label">平均客单价</div></div>
                <div class="metric-item"><div class="metric-value">${formatNum(d.total_users)}</div><div class="metric-label">总用户数</div></div>
            </div>`;
    } catch(e) {
        setStatus('s3_status', false);
        document.getElementById('behavior_content').innerHTML = '<div class="error-text">加载失败</div>';
    }
}

// ====== 4. 平台占比 ======
async function loadCategory() {
    try {
        const r = await authFetch(BASE + '/api/analytics/category-analysis');
        const d = await r.json();
        setStatus('s4_status', true);
        const colors = ['#818cf8', '#22c55e', '#f59e0b', '#ef4444', '#06b6d4', '#ec4899'];
        let html = '';
        d.categories.forEach((c, i) => {
            html += `<div class="platform-bar">
                <div class="platform-info"><span class="name">${c.platform_type}</span><span class="pct">${c.sales_ratio}% · ${formatMoney(c.total_sales)}</span></div>
                <div class="bar-track"><div class="bar-fill" style="width:${c.sales_ratio}%;background:${colors[i % colors.length]}"></div></div>
            </div>`;
        });
        document.getElementById('category_content').innerHTML = html;
    } catch(e) {
        setStatus('s4_status', false);
        document.getElementById('category_content').innerHTML = '<div class="error-text">加载失败</div>';
    }
}

// ====== 5. 最新订单 ======
async function loadOrders() {
    try {
        const r = await authFetch(BASE + '/api/orders?page_size=6');
        const d = await r.json();
        setStatus('s5_status', true);
        let html = '<table class="order-table"><thead><tr><th>订单号</th><th>商品编号</th><th>付款金额</th><th>平台</th><th>下单时间</th></tr></thead><tbody>';
        d.items.forEach(o => {
            const tagClass = o.platform_type === 'APP' ? 'tag-app' : o.platform_type.includes('微信') || o.platform_type.includes('公众号') ? 'tag-wx' : o.platform_type.includes('web') || o.platform_type.includes('网站') ? 'tag-web' : '';
            html += `<tr><td style="font-family:monospace;font-size:12px">${o.order_no}</td><td style="font-family:monospace">${o.product_id}</td><td>${formatMoney(o.payment_amount)}</td><td><span class="tag ${tagClass}">${o.platform_type}</span></td><td>${o.order_time.substring(0, 16).replace('T', ' ')}</td></tr>`;
        });
        html += '</tbody></table>';
        html += `<div style="margin-top:10px;color:#64748b;font-size:12px;">共 ${formatNum(d.total)} 条记录</div>`;
        document.getElementById('orders_content').innerHTML = html;
    } catch(e) {
        setStatus('s5_status', false);
        document.getElementById('orders_content').innerHTML = '<div class="error-text">加载失败</div>';
    }
}

// ====== 6. AI 查询 ======
async function askAI() {
    const input = document.getElementById('ai_input');
    const btn = document.getElementById('ai_btn');
    const resp = document.getElementById('ai_response');
    const query = input.value.trim();
    if (!query) return;

    btn.disabled = true;
    btn.textContent = '查询中...';
    resp.innerHTML = '<div class="ai-loading">🔐 正在认证...</div>';

    try {
        resp.innerHTML = '<div class="ai-loading">🤖 正在思考中，请稍候... (调用大模型生成SQL并执行查询)</div>';

        const controller = new AbortController();
        const timer = setTimeout(() => controller.abort(), 120000);
        const r = await authFetch(BASE + '/api/ai/query', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ query }),
            signal: controller.signal
        });
        clearTimeout(timer);
        const d = await r.json();

        setStatus('s6_status', r.ok);

        if (r.ok && d.sql) {
            let resultHtml = '';
            if (d.result && d.result.length > 0) {
                const keys = Object.keys(d.result[0]);
                resultHtml = '<table class="order-table" style="margin-top:12px"><thead><tr>' +
                    keys.map(k => `<th>${k}</th>`).join('') + '</tr></thead><tbody>';
                d.result.slice(0, 10).forEach(row => {
                    resultHtml += '<tr>' + keys.map(k => `<td>${row[k]}</td>`).join('') + '</tr>';
                });
                resultHtml += '</tbody></table>';
                if (d.result.length > 10) resultHtml += `<div style="color:#64748b;font-size:12px;margin-top:6px;">共 ${d.result.length} 条结果，显示前10条</div>`;
            }

            resp.innerHTML = `
                <div style="color:#22c55e;font-weight:600;margin-bottom:8px;">✅ AI 回答：</div>
                <div style="margin-bottom:12px;">${d.answer}</div>
                ${resultHtml}
                <div style="margin-top:12px;padding-top:12px;border-top:1px solid #334155;">
                    <div style="color:#818cf8;font-size:12px;margin-bottom:4px;">🔍 生成的SQL:</div>
                    <code style="display:block;background:#0a0f1e;padding:10px;border-radius:6px;font-size:12px;color:#a5b4fc;overflow-x:auto;">${d.sql}</code>
                </div>`;

            // AI 回答动画
            gsap.from(resp, { y: 10, opacity: 0, duration: 0.4, ease: 'power2.out' });
        } else {
            resp.innerHTML = `<div style="color:#f59e0b;">⚠️ ${d.answer || JSON.stringify(d)}</div>`;
        }
    } catch(e) {
        setStatus('s6_status', false);
        resp.innerHTML = '<div class="error-text">请求失败: ' + e.message + '</div>';
    }

    btn.disabled = false;
    btn.textContent = '发送查询';
}

// Enter键触发
document.getElementById('ai_input').addEventListener('keydown', e => {
    if (e.key === 'Enter') askAI();
});

// 全部加载
Promise.all([loadOverview(), loadProducts(), loadBehavior(), loadCategory(), loadOrders()]);
</script>
