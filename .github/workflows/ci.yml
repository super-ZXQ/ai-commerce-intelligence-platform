# GitHub Actions CI：单元测试 + 集成测试
# 触发：PR 同步 main / push main
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# 取消同 PR / 同 ref 上正在跑的旧 workflow，节省资源
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────── 1. AI 助手单元测试（核心 RAG 模块，必跑） ───────────
  ai-assistant-tests:
    name: AI 助手测试 (Python ${{ matrix.python-version }})
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12', '3.13']
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: |
            ai-ecommerce-assistant/requirements.txt
            backend/requirements.txt

      - name: 安装 AI 助手依赖
        working-directory: ai-ecommerce-assistant
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio

      - name: 跑 AI 助手测试（必跑，强制通过）
        working-directory: ai-ecommerce-assistant
        # conftest.py 用 FakeEmbeddings，不依赖 BGE 模型下载（约 93MB）
        # tee 到文件 + 上传 artifact：失败时可直接在 GitHub Actions 下载 stderr 排查
        run: python -m pytest tests/ -v --tb=short 2>&1 | tee pytest-output.txt

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-assistant-test-report-py${{ matrix.python-version }}
          path: ai-ecommerce-assistant/pytest-output.txt
          if-no-files-found: ignore
          retention-days: 7

  # ─────────── 2. 后端集成测试（带 MySQL service container） ───────────
  backend-tests:
    name: 后端测试 (Python 3.12)
    runs-on: ubuntu-latest
    # P6.10 修复：test_api.py 改用 authed_client（自动注入 JWT），原 client 调需鉴权接口会 401
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: 123456
          MYSQL_DATABASE: ai_commerce_intelligence_platform
          MYSQL_CHARSET: utf8mb4
          MYSQL_COLLATION: utf8mb4_unicode_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -p123456"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
          --health-start-period=20s

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y default-libmysqlclient-dev gcc

      - name: 安装后端依赖
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 等待 MySQL 就绪
        run: |
          for i in {1..30}; do
            if mysqladmin ping -h 127.0.0.1 -P 3306 -uroot -p123456 --silent; then
              echo "✅ MySQL ready"
              break
            fi
            echo "⏳ Waiting MySQL... ($i/30)"
            sleep 2
          done

      - name: 初始化 schema
        # P6.11 修复：原 step 用 mysql 客户端 < sql/01_create_table.sql，
        # 但该文件从未 commit（git 历史中完全不存在），导致 0 秒挂掉。
        # 改用 pymysql + SQLAlchemy ORM 自动建表（pymysql 已在 requirements.txt），
        # 同时不再依赖 mysql 系统包。
        # PYTHONPATH=. 显式注入 repo root，保证 `from backend.xxx import` 能解析。
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python - <<'PY'
          import pymysql
          from datetime import datetime, date
          from decimal import Decimal
          from sqlalchemy import create_engine, text
          from backend.config import get_settings
          from backend.database import Base
          from backend.models.database_models import Order  # noqa: F401 注册 ORM

          s = get_settings()
          # 1. 确保 database 存在（service container 通常已自动建，幂等保护）
          conn = pymysql.connect(host=s.db_host, port=s.db_port,
                                 user=s.db_user, password=s.db_password)
          with conn.cursor() as c:
              c.execute(f"CREATE DATABASE IF NOT EXISTS `{s.db_name}` "
                        f"DEFAULT CHARSET utf8mb4 COLLATE utf8mb4_unicode_ci")
          conn.commit()
          conn.close()
          print("✅ database ready")

          # 2. 用 SQLAlchemy ORM 同步建表
          eng = create_engine(s.database_url)
          Base.metadata.create_all(eng)
          with eng.connect() as c:
              c.execute(text("SELECT 1"))
          print("✅ tables created")

          # 3. 最小 seed：5 条 fake orders，让 test_sales_overview 的
          #    total_sales > 0 / total_orders > 0 断言通过
          #    幂等：清空后插入，避免多次跑 CI 累加
          with eng.begin() as c:
              c.execute(text("DELETE FROM orders"))
          from sqlalchemy.orm import sessionmaker
          Sess = sessionmaker(bind=eng)
          sess = Sess()
          for i in range(1, 6):
              sess.add(Order(
                  order_id=f"CI{i:05d}",
                  user_name=f"user_{i % 3}",
                  product_id=f"P{i:03d}",
                  order_amount=Decimal("100.00"),
                  payment_amount=Decimal("95.00"),
                  channel_id="ch1",
                  platform_type="APP" if i % 2 else "Web网站",
                  order_time=datetime(2026, 6, 1, 10, 0, 0),
                  payment_time=datetime(2026, 6, 1, 10, 5, 0),
                  is_refund="否",
                  discount_amount=Decimal("5.00"),
                  payment_duration_sec=300,
                  order_date=date(2026, 6, 1),
                  order_hour=10,
                  weekday="Monday",
              ))
          sess.commit()
          sess.close()
          print("✅ 5 fake orders seeded")
          PY

      - name: 写 .env 指向 CI MySQL
        working-directory: backend
        run: |
          cat > .env <<'EOF'
          DB_HOST=127.0.0.1
          DB_PORT=3306
          DB_USER=root
          DB_PASSWORD=123456
          DB_NAME=ai_commerce_intelligence_platform
          JWT_SECRET=ci-test-secret-not-for-production
          DEBUG=true
          EOF

      - name: 跑后端测试
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short \
            -p no:cacheprovider 2>&1 | tee pytest-output.txt

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-report
          path: backend/pytest-output.txt
          retention-days: 7

  # ─────────── 3. Lint + 语法快速检查（必跑） ───────────
  syntax-check:
    name: Python 语法检查
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 编译检查所有 .py 文件
        run: |
          # compileall 会自动跳过 __pycache__ / 没有 .py 的目录
          python -m compileall -q backend ai-ecommerce-assistant streamlit_app.py \
            || (echo "❌ 语法错误"; exit 1)
          echo "✅ 所有 Python 文件语法 OK"
