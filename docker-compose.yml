version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: ea-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-123456}
      MYSQL_DATABASE: ${DB_NAME:-ecommerce_analysis}
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./sql/01_create_table.sql:/docker-entrypoint-initdb.d/01_create_table.sql:ro
      - ./sql/02_import_data.sql:/docker-entrypoint-initdb.d/02_import_data.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - ea-network

  redis:
    image: redis:7-alpine
    container_name: ea-redis
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./deploy/redis.conf:/usr/local/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ea-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ea-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_NAME: ${DB_NAME:-ecommerce_analysis}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: 0
      JWT_SECRET: ${JWT_SECRET:-change-this-secret-in-production}
      DEBUG: ${DEBUG:-false}
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - ea-network

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: ea-streamlit
    restart: unless-stopped
    ports:
      - "${STREAMLIT_PORT:-8501}:8501"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ea-network

  ai-assistant:
    build:
      context: ./ai-ecommerce-assistant
      dockerfile: Dockerfile
    container_name: ea-ai-assistant
    restart: unless-stopped
    env_file:
      - ./ai-ecommerce-assistant/.env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: root
      DB_PASSWORD: ${DB_PASSWORD:-123456}
      DB_NAME: ${DB_NAME:-ecommerce_analysis}
    ports:
      - "${AI_PORT:-8505}:8502"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - ea-network

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local

networks:
  ea-network:
    driver: bridge
